experiment:
  name: vae_fashionmnist

paths:
  dataset_dir: datasets
  runs_dir: runs

dataset:
  name: fashion_mnist
  train: true
  train_split: 0.8
  shape: [1, 28, 28]

dataloader:
  batch_size: 128
  shuffle_train: true
  shuffle_validation: false
  num_workers: 0

training:
  epochs: 100
  learning_rate: 0.001
  start_weights: random

model:
  name: vae

  encoder:
    latent_dim: 32
    out_channels: [32, 64, 128, 128]
    kernels: [3, 3, 3, 3]
    strides: [2, 2, 2, 1]
    paddings: [1, 1, 1, 1]

optimizer:
  name: adam

scoring:
  pretrained_model: runs/vae_fashionmnist_lr_0.001_07-01_16-48-19/checkpoints/last.pt
  out_distribution_datasets: [mnist, organamnist, kmnist]

  dataloader:
    batch_size: 128
    num_workers: 0

  signals:
    likelihood:
      enabled: false
    typicality:
      enabled: false
    gradnorm:
      enabled: false
    latent_encoding:
      enabled: false
    hole_mass:
      enabled: true

seed: 42